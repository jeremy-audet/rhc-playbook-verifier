name: Python Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"  # default RHEL 9 interpreter
          - "3.12"  # default RHEL 10 interpreter
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python${{ matrix.python-version }} -m pip install .
      - name: Run tests
        run: python -m unittest discover python/tests/
